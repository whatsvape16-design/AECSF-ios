# Codemagic — Diya Vape iOS 云端构建（AECSF-ios 独立仓库，根目录即项目根）
# Configuration file: codemagic.yaml
# version: 2 (no triggering.paths — reload from GitHub if editor shows old yaml)

workflows:
  diya-vape-ios-adhoc:
    name: Diya Vape iOS (Ad Hoc IPA)
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      ios_signing:
        distribution_type: ad_hoc
        bundle_identifier: shop.diyavape.app
      vars:
        XCODE_SCHEME: DiyaVape
        BUNDLE_ID: shop.diyavape.app

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true

    scripts:
      - name: Configure code signing
        script: xcode-project use-profiles

      - name: Install icon dependencies
        script: pip3 install Pillow

      - name: Generate iOS icons
        script: python3 $CM_BUILD_DIR/scripts/prepare_ios_icons.py

      - name: Build IPA
        script: |
          cd $CM_BUILD_DIR
          xcode-project build-ipa \
            --project DiyaVape.xcodeproj \
            --scheme $XCODE_SCHEME

    artifacts:
      - build/ios/ipa/*.ipa
      - build/**/DiyaVape.app

    publishing:
      email:
        recipients:
          - whatsvape16@gmail.com
        notify:
          success: true
          failure: true

  diya-vape-ios-simulator:
    name: Diya Vape iOS (Simulator compile check)
    max_build_duration: 30
    instance_type: mac_mini_m2

    environment:
      vars:
        XCODE_SCHEME: DiyaVape

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true

    scripts:
      - name: Install icon dependencies
        script: pip3 install Pillow

      - name: Generate iOS icons
        script: python3 $CM_BUILD_DIR/scripts/prepare_ios_icons.py

      - name: Simulator build
        script: |
          cd $CM_BUILD_DIR
          xcodebuild \
            -project DiyaVape.xcodeproj \
            -scheme $XCODE_SCHEME \
            -configuration Debug \
            -destination "generic/platform=iOS Simulator" \
            -derivedDataPath output/DerivedData \
            build

    artifacts:
      - output/DerivedData/Build/Products/Debug-iphonesimulator/DiyaVape.app
